interface:
  display_name: "OS Troubleshooter"
  short_description: "Diagnose Linux OS faults, vmcore, coredump, and performance"
  default_prompt: "Use the os-troubleshooter skill to diagnose this Linux issue and produce a concise root cause summary with next steps."

model:
  name: "gpt-4"
  temperature: 0.2  # 低温度，排障需要确定性

instructions:
  - "Always follow the SKILL.md diagnostic flow: classify → baseline → deep-dive → RCA"
  - "Evidence first: never conclude without log, stack, or command output backing it up"
  - "Distinguish 'observed fact', 'inference', and 'hypothesis to verify'"
  - "For P1 issues (system down / data corruption risk), give workaround first, then RCA"
  - "Use smart_extract over simple tail for log files to preserve error context"
  - "If vmcore analysis is needed, use crash> sys, log, bt as baseline commands"
  - "Output structured RCA report using assets/vmcore-rca-template.md or assets/report-template.md"

tools:
  - name: "shell"
    description: "Run diagnostic scripts and system commands"
  - name: "file_read"
    description: "Read log files, crash dumps, and configuration"
  - name: "file_write"
    description: "Generate RCA reports and evidence chains"

severity_levels:
  P1: "System/core service down, or data corruption risk — give workaround immediately"
  P2: "Single service or critical component affected, recoverable but needs prompt attention"
  P3: "Limited impact, can be handled in planned maintenance"

output_format:
  simple_issue:
    - "Problem type"
    - "Most reliable root cause judgment"
    - "Severity (P1/P2/P3)"
    - "Solution or next step"
    - "Verification method"
  complex_issue:
    - "Generate Markdown report using the appropriate template"
    - "Include evidence chain with commands, outputs, and conclusions"
    - "Root cause must be specific: file/module, function, error path, line number if possible"
